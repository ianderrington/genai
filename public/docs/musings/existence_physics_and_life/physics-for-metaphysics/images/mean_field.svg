<svg xmlns="http://www.w3.org/2000/svg" width="700" height="300" viewBox="0 0 700 300">
  <defs>
    <radialGradient id="ripple1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.2"/>
      <stop offset="30%" style="stop-color:#e94560;stop-opacity:0.1"/>
      <stop offset="60%" style="stop-color:#e94560;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="ripple2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.15"/>
      <stop offset="40%" style="stop-color:#e94560;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </radialGradient>
    <marker id="arrowForce" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#f39c12" stroke-width="1"/>
    </marker>
  </defs>

  <rect width="700" height="300" fill="#1a1a2e"/>

  <!-- State space region boundary -->
  <rect x="40" y="20" width="620" height="260" rx="8" fill="none" stroke="#ecf0f1" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Entity positions and their ripples -->
  <!-- Entity 1 -->
  <circle cx="150" cy="80" r="90" fill="url(#ripple1)"/>
  <circle cx="150" cy="80" r="30" fill="none" stroke="#e94560" stroke-width="0.4" stroke-opacity="0.2"/>
  <circle cx="150" cy="80" r="55" fill="none" stroke="#e94560" stroke-width="0.3" stroke-opacity="0.12"/>
  <circle cx="150" cy="80" r="80" fill="none" stroke="#e94560" stroke-width="0.3" stroke-opacity="0.07"/>
  <circle cx="150" cy="80" r="6" fill="#e94560"/>

  <!-- Entity 2 -->
  <circle cx="320" cy="65" r="85" fill="url(#ripple2)"/>
  <circle cx="320" cy="65" r="28" fill="none" stroke="#e94560" stroke-width="0.4" stroke-opacity="0.18"/>
  <circle cx="320" cy="65" r="52" fill="none" stroke="#e94560" stroke-width="0.3" stroke-opacity="0.1"/>
  <circle cx="320" cy="65" r="78" fill="none" stroke="#e94560" stroke-width="0.3" stroke-opacity="0.06"/>
  <circle cx="320" cy="65" r="6" fill="#e94560"/>

  <!-- Entity 3 -->
  <circle cx="520" cy="95" r="90" fill="url(#ripple1)"/>
  <circle cx="520" cy="95" r="30" fill="none" stroke="#e94560" stroke-width="0.4" stroke-opacity="0.2"/>
  <circle cx="520" cy="95" r="58" fill="none" stroke="#e94560" stroke-width="0.3" stroke-opacity="0.1"/>
  <circle cx="520" cy="95" r="82" fill="none" stroke="#e94560" stroke-width="0.3" stroke-opacity="0.06"/>
  <circle cx="520" cy="95" r="6" fill="#e94560"/>

  <!-- Entity 4 -->
  <circle cx="180" cy="200" r="80" fill="url(#ripple2)"/>
  <circle cx="180" cy="200" r="26" fill="none" stroke="#e94560" stroke-width="0.4" stroke-opacity="0.18"/>
  <circle cx="180" cy="200" r="50" fill="none" stroke="#e94560" stroke-width="0.3" stroke-opacity="0.1"/>
  <circle cx="180" cy="200" r="72" fill="none" stroke="#e94560" stroke-width="0.3" stroke-opacity="0.06"/>
  <circle cx="180" cy="200" r="6" fill="#e94560"/>

  <!-- Entity 5 -->
  <circle cx="400" cy="195" r="85" fill="url(#ripple1)"/>
  <circle cx="400" cy="195" r="28" fill="none" stroke="#e94560" stroke-width="0.4" stroke-opacity="0.2"/>
  <circle cx="400" cy="195" r="54" fill="none" stroke="#e94560" stroke-width="0.3" stroke-opacity="0.1"/>
  <circle cx="400" cy="195" r="78" fill="none" stroke="#e94560" stroke-width="0.3" stroke-opacity="0.06"/>
  <circle cx="400" cy="195" r="6" fill="#e94560"/>

  <!-- Entity 6 -->
  <circle cx="570" cy="220" r="80" fill="url(#ripple2)"/>
  <circle cx="570" cy="220" r="25" fill="none" stroke="#e94560" stroke-width="0.4" stroke-opacity="0.18"/>
  <circle cx="570" cy="220" r="48" fill="none" stroke="#e94560" stroke-width="0.3" stroke-opacity="0.1"/>
  <circle cx="570" cy="220" r="70" fill="none" stroke="#e94560" stroke-width="0.3" stroke-opacity="0.06"/>
  <circle cx="570" cy="220" r="6" fill="#e94560"/>

  <!-- Entity 7 -->
  <circle cx="90" cy="145" r="70" fill="url(#ripple2)"/>
  <circle cx="90" cy="145" r="22" fill="none" stroke="#e94560" stroke-width="0.4" stroke-opacity="0.15"/>
  <circle cx="90" cy="145" r="45" fill="none" stroke="#e94560" stroke-width="0.3" stroke-opacity="0.08"/>
  <circle cx="90" cy="145" r="65" fill="none" stroke="#e94560" stroke-width="0.3" stroke-opacity="0.05"/>
  <circle cx="90" cy="145" r="5" fill="#e94560"/>

  <!-- Force arrows -nabla V at a few sample points -->
  <!-- Between entities 1 and 2, a test point pushed away -->
  <line x1="240" y1="100" x2="270" y2="115" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrowForce)" opacity="0.8"/>

  <!-- Between entities 2 and 3 -->
  <line x1="430" y1="105" x2="455" y2="120" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrowForce)" opacity="0.8"/>

  <!-- Between entities 4 and 5 -->
  <line x1="290" y1="185" x2="320" y2="178" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrowForce)" opacity="0.8"/>

  <!-- Near entity 6 -->
  <line x1="500" y1="180" x2="520" y2="168" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrowForce)" opacity="0.8"/>

  <!-- Labels -->
  <!-- "Each entity contributes to Phi" near entity 1 -->
  <text x="60" y="40" fill="#ecf0f1" font-family="'Arial','Helvetica',sans-serif" font-size="10" opacity="0.6" font-style="italic">Each entity contributes to &#x03A6;</text>

  <!-- V(X) formula near center -->
  <text x="270" y="148" fill="#ecf0f1" font-family="'Arial','Helvetica',sans-serif" font-size="12" opacity="0.75" font-style="italic">V(X) = &#x222B; &#x03C6;(X,X') &#x03C1;(X') dX'</text>

  <!-- -nabla V label -->
  <text x="458" y="135" fill="#f39c12" font-family="'Arial','Helvetica',sans-serif" font-size="12" font-style="italic" opacity="0.85">-&#x2207;V</text>
</svg>