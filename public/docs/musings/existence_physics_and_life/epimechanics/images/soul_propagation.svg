<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <!-- Core glow gradient (radial, for T_local bright region) -->
    <radialGradient id="coreGlow" cx="0.5" cy="0.3" r="0.6" fx="0.5" fy="0.3">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#e94560" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>

    <!-- Linear gradient for the main curve fill -->
    <linearGradient id="curveFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.35"/>
      <stop offset="35%" stop-color="#e94560" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#e94560" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </linearGradient>

    <!-- Ripple gradient for post-dissolution rings -->
    <radialGradient id="ripple1" cx="0.0" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0f3460" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#16213e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>

    <!-- Curve glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#1a1a2e"/>

  <!-- ============ PLOT AREA ============ -->
  <!-- Plot region: x=[80,760], y=[30,260] for main curve -->
  <!-- Host curves region: y=[280,400] -->

  <!-- Axes -->
  <line x1="80" y1="260" x2="760" y2="260" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.6"/>
  <line x1="80" y1="30" x2="80" y2="260" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.6"/>

  <!-- X-axis label -->
  <text x="420" y="278" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="12" text-anchor="middle" opacity="0.8">Time t</text>

  <!-- Y-axis label -->
  <text x="22" y="145" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="11" text-anchor="middle" opacity="0.8" transform="rotate(-90, 22, 145)">|R(E,t)| Representational Footprint</text>

  <!-- Axis tick marks -->
  <line x1="80" y1="260" x2="80" y2="264" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.5"/>
  <line x1="760" y1="260" x2="760" y2="264" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.5"/>

  <!-- Arrow heads on axes -->
  <polygon points="760,257 760,263 770,260" fill="#ffffff" fill-opacity="0.6"/>
  <polygon points="77,30 83,30 80,20" fill="#ffffff" fill-opacity="0.6"/>

  <!-- ============ T_LOCAL BRIGHT CORE REGION ============ -->
  <!-- Core glow behind the curve in T_local region -->
  <ellipse cx="230" cy="160" rx="170" ry="120" fill="url(#coreGlow)"/>

  <!-- ============ DISSOLUTION BOUNDARY ============ -->
  <!-- Vertical dashed line at entity dissolution -->
  <line x1="350" y1="32" x2="350" y2="258" stroke="#e94560" stroke-width="0.9" stroke-dasharray="6,4" stroke-opacity="0.7"/>
  <text x="354" y="44" fill="#e94560" font-family="Helvetica, Arial, sans-serif" font-size="9" opacity="0.85">Entity dissolution</text>
  <text x="354" y="56" fill="#e94560" font-family="Helvetica, Arial, sans-serif" font-size="9" opacity="0.85" font-style="italic">(kappa_s -> 0)</text>

  <!-- ============ RIPPLE RINGS (T_NONLOCAL) ============ -->
  <!-- Concentric arcs emanating from dissolution point -->
  <ellipse cx="370" cy="180" rx="60" ry="50" fill="none" stroke="#0f3460" stroke-width="0.8" stroke-opacity="0.35"/>
  <ellipse cx="400" cy="180" rx="120" ry="70" fill="none" stroke="#0f3460" stroke-width="0.7" stroke-opacity="0.25"/>
  <ellipse cx="440" cy="180" rx="190" ry="85" fill="none" stroke="#0f3460" stroke-width="0.6" stroke-opacity="0.18"/>
  <ellipse cx="490" cy="185" rx="250" ry="90" fill="none" stroke="#16213e" stroke-width="0.5" stroke-opacity="0.12"/>

  <!-- ============ MAIN R(E,t) CURVE ============ -->
  <!-- Fill under the curve -->
  <path d="M 80,260
           C 100,258 130,250 160,230
           C 190,210 220,150 260,100
           C 290,65 320,55 350,60
           C 370,63 390,80 410,110
           C 430,135 460,170 500,200
           C 540,220 580,235 620,243
           C 660,248 700,252 740,255
           L 740,260 Z"
        fill="url(#curveFill)"/>

  <!-- Main curve stroke -->
  <path d="M 80,258
           C 100,256 130,248 160,228
           C 190,208 220,148 260,98
           C 290,63 320,53 350,58
           C 370,62 390,78 410,108
           C 430,133 460,168 500,198
           C 540,218 580,233 620,242
           C 660,248 700,252 740,255"
        fill="none" stroke="#e94560" stroke-width="2" filter="url(#glow)" stroke-opacity="0.9"/>

  <!-- Peak marker -->
  <circle cx="330" cy="54" r="2.5" fill="#e94560" opacity="0.8"/>
  <text x="330" y="48" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" opacity="0.6">peak</text>

  <!-- ============ HOST ENTITY DOTS (T_NONLOCAL) ============ -->
  <!-- Small dots representing host entities carrying the pattern -->
  <circle cx="410" cy="108" r="3" fill="#53a8b6" opacity="0.7"/>
  <circle cx="460" cy="155" r="2.5" fill="#53a8b6" opacity="0.55"/>
  <circle cx="520" cy="195" r="2" fill="#53a8b6" opacity="0.45"/>
  <circle cx="570" cy="215" r="2" fill="#53a8b6" opacity="0.35"/>
  <circle cx="620" cy="232" r="1.8" fill="#53a8b6" opacity="0.3"/>
  <circle cx="670" cy="242" r="1.5" fill="#53a8b6" opacity="0.22"/>
  <circle cx="710" cy="249" r="1.3" fill="#53a8b6" opacity="0.18"/>

  <!-- Label for host dots -->
  <text x="540" y="170" fill="#53a8b6" font-family="Helvetica, Arial, sans-serif" font-size="8" opacity="0.7" font-style="italic">host entities j</text>

  <!-- ============ PHASE LABELS ============ -->
  <!-- T_local bracket -->
  <line x1="85" y1="270" x2="345" y2="270" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.4"/>
  <line x1="85" y1="267" x2="85" y2="273" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.4"/>
  <line x1="345" y1="267" x2="345" y2="273" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="215" y="282" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="10" text-anchor="middle" opacity="0.7" font-weight="bold">T_local</text>

  <!-- T_nonlocal bracket -->
  <line x1="355" y1="270" x2="755" y2="270" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.4"/>
  <line x1="355" y1="267" x2="355" y2="273" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.4"/>
  <line x1="755" y1="267" x2="755" y2="273" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="555" y="282" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="10" text-anchor="middle" opacity="0.7" font-weight="bold">T_nonlocal</text>

  <!-- Propagation label -->
  <text x="555" y="296" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="8" text-anchor="middle" opacity="0.45" font-style="italic">Pattern persists in hosts: students, institutions, texts</text>

  <!-- ============ HOST CONTRIBUTION CURVES ============ -->
  <!-- Separator line -->
  <line x1="80" y1="315" x2="760" y2="315" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.2" stroke-dasharray="2,3"/>

  <!-- Sub-axes -->
  <line x1="80" y1="400" x2="760" y2="400" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.3"/>
  <line x1="80" y1="325" x2="80" y2="400" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.3"/>

  <!-- Dissolution reference line in sub-plot -->
  <line x1="350" y1="320" x2="350" y2="400" stroke="#e94560" stroke-width="0.5" stroke-dasharray="3,3" stroke-opacity="0.3"/>

  <!-- Host 1: Student — brief, moderate amplitude, starts at dissolution -->
  <path d="M 350,400
           C 360,398 370,380 385,360
           C 400,345 415,350 430,365
           C 445,380 460,392 480,398
           C 495,400 500,400 500,400"
        fill="none" stroke="#f5a623" stroke-width="1.2" filter="url(#softGlow)" stroke-opacity="0.75"/>
  <text x="505" y="370" fill="#f5a623" font-family="Helvetica, Arial, sans-serif" font-size="8" opacity="0.7">Host 1 (student)</text>

  <!-- Host 2: Institution — longer, sustained, starts near dissolution -->
  <path d="M 350,400
           C 365,397 380,388 400,375
           C 420,365 440,362 470,363
           C 500,364 540,367 580,372
           C 620,378 660,386 700,393
           C 720,396 740,399 740,400"
        fill="none" stroke="#48b5a0" stroke-width="1.2" filter="url(#softGlow)" stroke-opacity="0.75"/>
  <text x="600" y="358" fill="#48b5a0" font-family="Helvetica, Arial, sans-serif" font-size="8" opacity="0.7">Host 2 (institution)</text>

  <!-- Host 3: Text — very long, low amplitude -->
  <path d="M 350,400
           C 370,399 400,396 430,393
           C 460,391 500,390 540,390
           C 580,390 620,391 660,392
           C 700,393 730,394 755,395"
        fill="none" stroke="#7b68ee" stroke-width="1.2" filter="url(#softGlow)" stroke-opacity="0.75"/>
  <text x="660" y="386" fill="#7b68ee" font-family="Helvetica, Arial, sans-serif" font-size="8" opacity="0.7">Host 3 (text)</text>

  <!-- Sub-plot label -->
  <text x="82" y="312" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="8" opacity="0.45">Individual host contributions</text>

  <!-- ============ T_NONLOCAL FORMULA ============ -->
  <text x="420" y="430" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="10" text-anchor="middle" opacity="0.55" font-style="italic">T_nonlocal = mu({t : ||R|| > epsilon})</text>

  <!-- ============ EPSILON THRESHOLD LINE ============ -->
  <line x1="80" y1="252" x2="760" y2="252" stroke="#ffffff" stroke-width="0.4" stroke-dasharray="2,4" stroke-opacity="0.2"/>
  <text x="765" y="254" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="7" opacity="0.35">epsilon</text>

  <!-- ============ TITLE ============ -->
  <text x="400" y="16" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="13" text-anchor="middle" opacity="0.85" font-weight="bold" letter-spacing="1">Representational Footprint R(E,t) : Soul Propagation</text>

</svg>