<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    </style>
    <linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="45%" stop-color="#4fc3f7"/>
      <stop offset="55%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#ef5350"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#1a1a2e"/>

  <!-- Phase region tints -->
  <rect x="80" y="30" width="310" height="310" fill="#1b3a4b" opacity="0.45" rx="4"/>
  <rect x="390" y="30" width="370" height="310" fill="#3b1a2e" opacity="0.4" rx="4"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="80" y1="100" x2="760" y2="100"/>
    <line x1="80" y1="170" x2="760" y2="170"/>
    <line x1="80" y1="240" x2="760" y2="240"/>
    <line x1="200" y1="30" x2="200" y2="340"/>
    <line x1="320" y1="30" x2="320" y2="340"/>
    <line x1="510" y1="30" x2="510" y2="340"/>
    <line x1="640" y1="30" x2="640" y2="340"/>
  </g>

  <!-- Axes -->
  <line x1="80" y1="340" x2="760" y2="340" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="80" y1="30" x2="80" y2="340" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Axis tick marks -->
  <g stroke="#ffffff" stroke-width="1">
    <line x1="390" y1="340" x2="390" y2="347"/>
    <line x1="80" y1="70" x2="73" y2="70"/>
    <line x1="80" y1="340" x2="73" y2="340"/>
  </g>

  <!-- Axis labels -->
  <text x="420" y="375" fill="#ffffff" font-size="14" text-anchor="middle" font-weight="300">Temperature &#x1D4E3; (volatility)</text>
  <text x="28" y="190" fill="#ffffff" font-size="14" text-anchor="middle" font-weight="300" transform="rotate(-90, 28, 190)">Order Parameter (consensus)</text>

  <!-- Axis endpoint labels -->
  <text x="80" y="395" fill="#aaaaaa" font-size="11" text-anchor="middle">Low</text>
  <text x="760" y="395" fill="#aaaaaa" font-size="11" text-anchor="middle">High</text>
  <text x="60" y="74" fill="#aaaaaa" font-size="11" text-anchor="end">1</text>
  <text x="60" y="344" fill="#aaaaaa" font-size="11" text-anchor="end">0</text>

  <!-- T_c vertical dashed line -->
  <line x1="390" y1="30" x2="390" y2="340" stroke="#ffd54f" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.8"/>

  <!-- T_c label -->
  <text x="390" y="22" fill="#ffd54f" font-size="13" text-anchor="middle" font-weight="600">T<tspan font-size="9" dy="3">c</tspan><tspan dy="-3">: Critical Point</tspan></text>

  <!-- Phase transition curve (second-order, smooth bezier) -->
  <!-- Left side: high order parameter, curving down to Tc -->
  <!-- Right side: zero order parameter -->
  <path d="M 80,70 C 180,70 280,72 340,90 Q 365,110 380,180 Q 387,260 390,340"
        fill="none" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 390,340 L 760,340"
        fill="none" stroke="#ef5350" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Critical point marker -->
  <circle cx="390" cy="340" r="5" fill="#ffd54f" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Phase region labels -->
  <text x="230" y="55" fill="#4fc3f7" font-size="12" text-anchor="middle" font-weight="500" opacity="0.9">Ordered Phase</text>
  <text x="230" y="70" fill="#4fc3f7" font-size="10.5" text-anchor="middle" font-weight="300" opacity="0.7">(consensus, laminar)</text>

  <text x="575" y="55" fill="#ef5350" font-size="12" text-anchor="middle" font-weight="500" opacity="0.9">Disordered Phase</text>
  <text x="575" y="70" fill="#ef5350" font-size="10.5" text-anchor="middle" font-weight="300" opacity="0.7">(polarization, turbulent)</text>

  <!-- Early Warning Signals annotation box -->
  <rect x="430" y="120" width="220" height="100" fill="#1a1a2e" stroke="#ffd54f" stroke-width="0.8" rx="5" opacity="0.85"/>
  <text x="540" y="140" fill="#ffd54f" font-size="12" text-anchor="middle" font-weight="600">Early Warning Signals</text>
  <line x1="450" y1="148" x2="630" y2="148" stroke="#ffd54f" stroke-width="0.5" opacity="0.5"/>
  <text x="460" y="167" fill="#e0e0e0" font-size="11" font-weight="300">&#x2191; Correlation length diverges</text>
  <text x="460" y="187" fill="#e0e0e0" font-size="11" font-weight="300">&#x2191; Relaxation time increases</text>
  <text x="460" y="207" fill="#e0e0e0" font-size="11" font-weight="300">&#x2191; Variance increases</text>

  <!-- Arrow from annotation box to critical region -->
  <path d="M 430,170 Q 415,220 393,300" fill="none" stroke="#ffd54f" stroke-width="0.8" stroke-dasharray="3,3" marker-end="url(#arrowYellow)"/>
  <defs>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0,0 L 8,3 L 0,6 Z" fill="#ffd54f"/>
    </marker>
  </defs>

  <!-- Analogies at bottom -->
  <line x1="80" y1="410" x2="760" y2="410" stroke="#ffffff" stroke-width="0.3" opacity="0.3"/>
  <text x="120" y="430" fill="#4fc3f7" font-size="11" font-weight="400" opacity="0.8">Ferromagnet:</text>
  <text x="210" y="430" fill="#bbbbbb" font-size="11" font-weight="300" opacity="0.7">aligned spins &#x2192; random spins</text>
  <text x="470" y="430" fill="#ef5350" font-size="11" font-weight="400" opacity="0.8">Society:</text>
  <text x="525" y="430" fill="#bbbbbb" font-size="11" font-weight="300" opacity="0.7">consensus &#x2192; polarization</text>
</svg>