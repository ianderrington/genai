<svg xmlns="http://www.w3.org/2000/svg" width="700" height="300" viewBox="0 0 700 300">
  <defs>
    <radialGradient id="entityGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.08"/>
      <stop offset="70%" style="stop-color:#e94560;stop-opacity:0.03"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </radialGradient>
    <marker id="arrowIn" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#5dade2" stroke-width="1"/>
    </marker>
    <marker id="arrowOut" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#f39c12" stroke-width="1"/>
    </marker>
    <marker id="arrowSelf" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="none" stroke="#2ecc71" stroke-width="1"/>
    </marker>
  </defs>

  <rect width="700" height="300" fill="#1a1a2e"/>

  <!-- Glow behind entity -->
  <ellipse cx="340" cy="145" rx="160" ry="110" fill="url(#entityGlow)"/>

  <!-- Entity boundary — organic dashed shape -->
