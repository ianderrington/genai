  <circle cx="390" cy="200" r="1.2" fill="#ecf0f1" opacity="0.4"/>
  <circle cx="250" cy="130" r="1" fill="#ecf0f1" opacity="0.35"/>
  <circle cx="430" cy="140" r="1" fill="#ecf0f1" opacity="0.35"/>

  <!-- Sparse outer connections -->
  <line x1="280" y1="110" x2="308" y2="132" stroke="#ecf0f1" stroke-width="0.3" opacity="0.15"/>
  <line x1="400" y1="115" x2="370" y2="135" stroke="#ecf0f1" stroke-width="0.3" opacity="0.15"/>
  <line x1="260" y1="155" x2="308" y2="132" stroke="#ecf0f1" stroke-width="0.3" opacity="0.15"/>
  <line x1="420" y1="170" x2="370" y2="135" stroke="#ecf0f1" stroke-width="0.3" opacity="0.15"/>
