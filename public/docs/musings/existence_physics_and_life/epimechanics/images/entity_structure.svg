           C495,115 500,145 495,175 C490,210 460,240 420,250
           C380,258 310,260 270,248 C230,235 205,210 195,180
           C185,150 200,115 230,90 Z"
        fill="none" stroke="#e94560" stroke-width="1.8" stroke-dasharray="8,5" stroke-opacity="0.85"/>

  <!-- Internal causal network — dense center, sparse edges -->
  <!-- Central dense cluster -->
  <circle cx="340" cy="140" r="2.5" fill="#ecf0f1" opacity="0.7"/>
  <circle cx="355" cy="130" r="2" fill="#ecf0f1" opacity="0.65"/>
  <circle cx="325" cy="128" r="2" fill="#ecf0f1" opacity="0.65"/>
