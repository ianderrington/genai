  <line x1="430" y1="140" x2="400" y2="115" stroke="#ecf0f1" stroke-width="0.3" opacity="0.12"/>

  <!-- Self-coupling circular arrow (inside blob, top-right area) -->
  <path d="M395,85 A18,18 0 1,1 385,75" fill="none" stroke="#2ecc71" stroke-width="1.2" stroke-opacity="0.7" marker-end="url(#arrowSelf)"/>

  <!-- External forces — arrows pointing inward -->
  <line x1="130" y1="100" x2="195" y2="120" stroke="#5dade2" stroke-width="1.3" marker-end="url(#arrowIn)" opacity="0.75"/>
  <line x1="150" y1="200" x2="210" y2="190" stroke="#5dade2" stroke-width="1.3" marker-end="url(#arrowIn)" opacity="0.75"/>
  <line x1="340" y1="15" x2="345" y2="55" stroke="#5dade2" stroke-width="1.3" marker-end="url(#arrowIn)" opacity="0.75"/>

  <!-- Entity field contribution — arrows pointing outward -->
  <line x1="480" y1="120" x2="545" y2="100" stroke="#f39c12" stroke-width="1.3" marker-end="url(#arrowOut)" opacity="0.75"/>
  <line x1="475" y1="195" x2="540" y2="210" stroke="#f39c12" stroke-width="1.3" marker-end="url(#arrowOut)" opacity="0.75"/>
  <line x1="430" y1="240" x2="470" y2="265" stroke="#f39c12" stroke-width="1.3" marker-end="url(#arrowOut)" opacity="0.75"/>

  <!-- Labels -->
  <!-- M label inside -->
  <text x="290" y="225" fill="#ecf0f1" font-family="'Arial','Helvetica',sans-serif" font-size="11" opacity="0.8" font-style="italic">M &gt; 0</text>
  <text x="290" y="238" fill="#ecf0f1" font-family="'Arial','Helvetica',sans-serif" font-size="9" opacity="0.55">(internal causal density)</text>

  <!-- Boundary label -->
  <text x="475" y="80" fill="#e94560" font-family="'Arial','Helvetica',sans-serif" font-size="11" opacity="0.85" font-style="italic">&#x2202;E: &#x03BA;s = &#x03BA;c</text>

  <!-- External forces label -->
  <text x="70" y="85" fill="#5dade2" font-family="'Arial','Helvetica',sans-serif" font-size="11" opacity="0.8">External</text>
  <text x="70" y="98" fill="#5dade2" font-family="'Arial','Helvetica',sans-serif" font-size="11" opacity="0.8">forces F</text>

  <!-- Field contribution label -->
  <text x="550" y="96" fill="#f39c12" font-family="'Arial','Helvetica',sans-serif" font-size="11" opacity="0.8">Entity field</text>
  <text x="550" y="109" fill="#f39c12" font-family="'Arial','Helvetica',sans-serif" font-size="11" opacity="0.8" font-style="italic">&#x03A6;E</text>

  <!-- Self-coupling label -->
  <text x="400" y="72" fill="#2ecc71" font-family="'Arial','Helvetica',sans-serif" font-size="10" opacity="0.7" font-style="italic">&#x03BA;s &gt; 0</text>
