  <circle cx="328" cy="155" r="2" fill="#ecf0f1" opacity="0.65"/>
  <circle cx="360" cy="142" r="1.8" fill="#ecf0f1" opacity="0.6"/>
  <circle cx="315" cy="142" r="2" fill="#ecf0f1" opacity="0.65"/>
  <circle cx="342" cy="118" r="1.8" fill="#ecf0f1" opacity="0.6"/>
  <circle cx="338" cy="162" r="2" fill="#ecf0f1" opacity="0.65"/>
  <circle cx="370" cy="135" r="1.5" fill="#ecf0f1" opacity="0.55"/>
  <circle cx="308" cy="132" r="1.5" fill="#ecf0f1" opacity="0.55"/>
  <circle cx="345" cy="170" r="1.8" fill="#ecf0f1" opacity="0.6"/>
  <circle cx="355" cy="160" r="1.5" fill="#ecf0f1" opacity="0.55"/>
  <circle cx="320" cy="168" r="1.5" fill="#ecf0f1" opacity="0.55"/>

  <!-- Connections — central dense -->
  <line x1="340" y1="140" x2="355" y2="130" stroke="#ecf0f1" stroke-width="0.5" opacity="0.3"/>
  <line x1="340" y1="140" x2="325" y2="128" stroke="#ecf0f1" stroke-width="0.5" opacity="0.3"/>
  <line x1="340" y1="140" x2="350" y2="150" stroke="#ecf0f1" stroke-width="0.5" opacity="0.3"/>
  <line x1="340" y1="140" x2="328" y2="155" stroke="#ecf0f1" stroke-width="0.5" opacity="0.3"/>
  <line x1="340" y1="140" x2="360" y2="142" stroke="#ecf0f1" stroke-width="0.5" opacity="0.3"/>
  <line x1="340" y1="140" x2="315" y2="142" stroke="#ecf0f1" stroke-width="0.5" opacity="0.3"/>
  <line x1="355" y1="130" x2="360" y2="142" stroke="#ecf0f1" stroke-width="0.4" opacity="0.25"/>
  <line x1="325" y1="128" x2="315" y2="142" stroke="#ecf0f1" stroke-width="0.4" opacity="0.25"/>
  <line x1="350" y1="150" x2="360" y2="142" stroke="#ecf0f1" stroke-width="0.4" opacity="0.25"/>
  <line x1="328" y1="155" x2="315" y2="142" stroke="#ecf0f1" stroke-width="0.4" opacity="0.25"/>
  <line x1="355" y1="130" x2="342" y2="118" stroke="#ecf0f1" stroke-width="0.4" opacity="0.25"/>
  <line x1="325" y1="128" x2="342" y2="118" stroke="#ecf0f1" stroke-width="0.4" opacity="0.25"/>
  <line x1="350" y1="150" x2="355" y2="160" stroke="#ecf0f1" stroke-width="0.4" opacity="0.25"/>
  <line x1="328" y1="155" x2="338" y2="162" stroke="#ecf0f1" stroke-width="0.4" opacity="0.25"/>
  <line x1="338" y1="162" x2="345" y2="170" stroke="#ecf0f1" stroke-width="0.4" opacity="0.2"/>
  <line x1="355" y1="160" x2="345" y2="170" stroke="#ecf0f1" stroke-width="0.4" opacity="0.2"/>
  <line x1="350" y1="150" x2="328" y2="155" stroke="#ecf0f1" stroke-width="0.4" opacity="0.25"/>
  <line x1="370" y1="135" x2="360" y2="142" stroke="#ecf0f1" stroke-width="0.4" opacity="0.2"/>
  <line x1="370" y1="135" x2="355" y2="130" stroke="#ecf0f1" stroke-width="0.4" opacity="0.2"/>
  <line x1="308" y1="132" x2="315" y2="142" stroke="#ecf0f1" stroke-width="0.4" opacity="0.2"/>
  <line x1="308" y1="132" x2="325" y2="128" stroke="#ecf0f1" stroke-width="0.4" opacity="0.2"/>
  <line x1="320" y1="168" x2="328" y2="155" stroke="#ecf0f1" stroke-width="0.3" opacity="0.18"/>
  <line x1="320" y1="168" x2="338" y2="162" stroke="#ecf0f1" stroke-width="0.3" opacity="0.18"/>

