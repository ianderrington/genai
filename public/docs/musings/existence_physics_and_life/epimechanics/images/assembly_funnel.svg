<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow-left" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto" fill="#ecf0f1">
      <polygon points="8 0, 0 3, 8 6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="350" y="24" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ecf0f1" font-weight="bold" opacity="0.7">State-Space Assembly Funnel</text>

  <!-- Outermost: S (Assembly Universe) -->
  <rect x="30" y="38" width="640" height="280" rx="14" ry="14" fill="#2c3e50" fill-opacity="0.2" stroke="#2c3e50" stroke-width="2.5"/>
  <text x="50" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ecf0f1" font-weight="bold">S: All possible configurations</text>
  <text x="50" y="76" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ecf0f1" opacity="0.55">(Assembly Universe)</text>

  <!-- Second: S_possible -->
  <rect x="70" y="88" width="560" height="218" rx="12" ry="12" fill="#2980b9" fill-opacity="0.12" stroke="#2980b9" stroke-width="2"/>
  <text x="90" y="110" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#3498db" font-weight="bold">S_possible: Constrained by physical laws</text>
  <text x="90" y="126" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#3498db" opacity="0.7">V(X)</text>

  <!-- Third: S_contingent -->
  <rect x="120" y="138" width="460" height="156" rx="10" ry="10" fill="#8e44ad" fill-opacity="0.12" stroke="#8e44ad" stroke-width="2"/>
  <text x="140" y="160" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#9b59b6" font-weight="bold">S_contingent: Selected by action principle</text>
  <text x="140" y="176" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#9b59b6" opacity="0.7">&#x3B4;&#x222B;L dt = 0</text>

  <!-- Innermost: S_observed -->
  <rect x="190" y="190" width="280" height="90" rx="8" ry="8" fill="#e74c3c" fill-opacity="0.15" stroke="#e74c3c" stroke-width="2"/>
  <!-- Small filled core -->
  <rect x="280" y="215" width="100" height="40" rx="6" ry="6" fill="#e74c3c" fill-opacity="0.5"/>
  <text x="210" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#e74c3c" font-weight="bold">S_observed: Actual X(t)</text>
  <text x="330" y="240" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#fff" opacity="0.8">X(t)</text>

  <!-- Right-side arrow pointing inward -->
  <line x1="740" y1="100" x2="740" y2="270" stroke="#ecf0f1" stroke-width="1.5" opacity="0.35"/>
  <!-- Arrowheads pointing left at multiple levels -->
  <line x1="740" y1="55" x2="674" y2="55" stroke="#ecf0f1" stroke-width="1" opacity="0.3" marker-end="url(#arrow-left)"/>
  <line x1="740" y1="130" x2="634" y2="130" stroke="#ecf0f1" stroke-width="1" opacity="0.35" marker-end="url(#arrow-left)"/>
  <line x1="740" y1="200" x2="584" y2="200" stroke="#ecf0f1" stroke-width="1" opacity="0.4" marker-end="url(#arrow-left)"/>
  <line x1="740" y1="250" x2="474" y2="250" stroke="#ecf0f1" stroke-width="1" opacity="0.5" marker-end="url(#arrow-left)"/>

  <!-- Vertical connector for arrows -->
  <line x1="740" y1="55" x2="740" y2="250" stroke="#ecf0f1" stroke-width="1" opacity="0.3"/>

  <!-- Label for arrow -->
  <text x="760" y="145" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ecf0f1" opacity="0.5" writing-mode="tb">Constraints narrow possibilities</text>

</svg>