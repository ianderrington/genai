name: Issue Evaluation and Labeling

on:
  issues:
    types: [opened, reopened]

jobs:
  evaluate:
    if: contains(fromJson('["ianderrington"]'), github.actor)
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    outputs:
      label: ${{ steps.evaluate_issue.outputs.label }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      # this install the package in editable mode thought it is too slow
      # for github actions repeatedly. 
      # - name: install
      #   run: pip install -e .
      #   #run: pip install -e . && pip install -r requirements.txt

      # - name: replace requirements
      #   run: sed -i "s/ssh:\/\/git@github\.com/https:\/\/${{ secrets.GH_USERNAME }}:${{ secrets.GH_PAT_WITH_ACCESS_TO_OTHER_REPOS }}@github\.com/g" requirements.txt

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip

      - name: Run issue evaluation script
        id: evaluate_issue
        run: python .github/scripts/evaluate_issue.py ${{ github.event.issue.number }} ${{ github.event.issue.body }} >> "$GITHUB_OUTPUT"
        # run: echo "label=IncludeInDocs" >> "$GITHUB_OUTPUT"

  label:
    if: contains(fromJson('["ianderrington"]'), github.actor)
    runs-on: ubuntu-latest
    needs: evaluate
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
      - name: Label Issue
        env:
          LABEL: ${{ needs.evaluate.outputs.label }}
          GH_TOKEN: ${{ github.token }}
        run: gh issue edit ${{github.event.issue.number}} --add-label $LABEL

