name: Issue Evaluation and Labeling

on:
  issues:
    types: [opened, reopened]

jobs:
  evaluate_and_label:
    if: contains(fromJson('["ianderrington"]'), github.actor)
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@main

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: python -m pip install --upgrade pip

    - name: Run issue evaluation script
      id: evaluate_issue
      run: python .github/scripts/evaluate_issue.py ${{ github.event.issue.number }} ${{ github.event.issue.body }}

    - name: Label Issue
      run: gh issue edit ${{ github.event.issue.number }} --add-label ${{ steps.evaluate_issue.outputs.run }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

